name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # Windows — aimax-bundle-windows.exe (Inno Setup installer)
  # ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # build.py 의 _build_agent_launcher() 가 Go 로 aimax-agent-launcher.exe 를 빌드한다.
      # Go 가 없으면 RuntimeError 로 전체 빌드가 중단되므로 CI 러너에 Go 를 설치한다.
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build.py
        env:
          PYTHONIOENCODING: utf-8

      # 배포용 설치 파일은 onedir(dist\AIMAX)을 Inno Setup 으로 패키징한 aimax-bundle-windows.exe 다.
      # windows-latest 에 Inno Setup 은 기본 미포함 → choco 로 설치 후 iscc 실행.
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package installer with Inno Setup
        shell: pwsh
        run: |
          # aimax_compliance.py 의 APP_VERSION(vX.Y.Z) 을 그대로 읽어 Inno AppVersion(X.Y.Z)으로 전달
          $verLine = Select-String -Path aimax_compliance.py -Pattern 'APP_VERSION\s*=\s*"v?([0-9]+\.[0-9]+\.[0-9]+)"' | Select-Object -First 1
          if (-not $verLine) { throw "APP_VERSION 을 aimax_compliance.py 에서 찾지 못했습니다" }
          $appVersion = $verLine.Matches[0].Groups[1].Value
          Write-Host "AppVersion = $appVersion"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe 없음: $iscc" }
          if (-not (Test-Path "dist\AIMAX")) { throw "dist\AIMAX 없음 (build.py 산출물 확인)" }
          & $iscc "packaging\windows\aimax_installer.iss" `
            "/DSourceDir=dist\AIMAX" `
            "/DOutputDir=dist\upload" `
            "/DOutputBaseFilename=aimax-bundle-windows" `
            "/DAppVersion=$appVersion"
          if ($LASTEXITCODE -ne 0) { throw "iscc 실패 (exit $LASTEXITCODE)" }
          if (-not (Test-Path "dist\upload\aimax-bundle-windows.exe")) { throw "설치 파일 미생성" }
          Write-Host "설치 파일 생성 완료: dist\upload\aimax-bundle-windows.exe"
          Get-Item "dist\upload\aimax-bundle-windows.exe" | Select-Object Name,Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimax-bundle-windows
          path: dist/upload/aimax-bundle-windows.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/upload/aimax-bundle-windows.exe
          generate_release_notes: true

  # ──────────────────────────────────────────
  # macOS — aimax-bundle-macos.dmg
  # ──────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # macOS Tk 지원 (ttkbootstrap 의존)
          brew install python-tk@3.11 || true

      - name: Build with PyInstaller
        run: python build.py
        env:
          PYTHONIOENCODING: utf-8
          TK_SILENCE_DEPRECATION: "1"

      # build.py(_make_macos_dmg) 가 dist/AIMAX-macos.dmg 를 생성한다 → 배포명으로 복사
      - name: Rename DMG to distribution name
        run: |
          if [ ! -f "dist/AIMAX-macos.dmg" ]; then
            echo "ERROR: dist/AIMAX-macos.dmg 없음 (build.py 산출물 확인)"; exit 1
          fi
          cp "dist/AIMAX-macos.dmg" "dist/aimax-bundle-macos.dmg"
          ls -la dist/aimax-bundle-macos.dmg

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimax-bundle-macos
          path: dist/aimax-bundle-macos.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aimax-bundle-macos.dmg
