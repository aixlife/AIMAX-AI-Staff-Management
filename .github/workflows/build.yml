name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # Windows — NaverBlogAuto_windows.zip
  # ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run source preflight
        run: python scripts/preflight_split_drift.py

      - name: Build with PyInstaller
        run: python build.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Package into zip
        shell: pwsh
        run: |
          $distFolder = "dist\NaverBlogAuto"
          if (-not (Test-Path $distFolder)) { throw "dist\NaverBlogAuto 폴더 없음" }
          Compress-Archive -Path "$distFolder\*" -DestinationPath "dist\NaverBlogAuto_windows.zip" -Force
          Write-Host "zip 생성 완료: dist\NaverBlogAuto_windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaverBlogAuto-windows
          path: dist/NaverBlogAuto_windows.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NaverBlogAuto_windows.zip
          generate_release_notes: true

  # ──────────────────────────────────────────
  # macOS — NaverBlogAuto_mac.zip
  # ──────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # macOS Tk 지원 (ttkbootstrap 의존)
          brew install python-tk@3.11 || true

      - name: Run source preflight
        run: python scripts/preflight_split_drift.py

      - name: Build with PyInstaller
        run: python build.py
        env:
          PYTHONIOENCODING: utf-8
          TK_SILENCE_DEPRECATION: "1"

      - name: Package into zip
        run: |
          # .app 번들이 생성된 경우 우선 패키징
          if [ -d "dist/NaverBlogAuto.app" ]; then
            cd dist && zip -r ../NaverBlogAuto_mac.zip NaverBlogAuto.app
          elif [ -d "dist/NaverBlogAuto" ]; then
            cd dist && zip -r ../NaverBlogAuto_mac.zip NaverBlogAuto
          else
            echo "ERROR: dist 산출물 없음" && exit 1
          fi
          echo "zip 생성 완료: NaverBlogAuto_mac.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaverBlogAuto-mac
          path: NaverBlogAuto_mac.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NaverBlogAuto_mac.zip
