    $("#myReportsTable").addEventListener("click", async (event) => {
      const button = event.target.closest("[data-report-response]");
      if (!button) return;
      const reportId = button.dataset.reportId || "";
      const response = button.dataset.reportResponse || "";
      const noteField = $$("[data-report-note]").find((item) => item.dataset.reportNote === reportId);
      const note = noteField?.value || "";
      button.disabled = true;
      try {
        await sendReportResponse(reportId, response, note);
      } catch (error) {
        showToast(errorMessage(error, "확인 결과를 보내지 못했습니다."));
        button.disabled = false;
      }
    });
    async function sendReportAttentionResponse(response) {
      const report = activeReportAttentionReport();
      if (!report?.report_id) return;
      const buttons = [$("#reportAttentionResolvedBtn"), $("#reportAttentionStillBtn")].filter(Boolean);
      buttons.forEach((button) => { button.disabled = true; });
      try {
        await sendReportResponse(report.report_id, response, $("#reportAttentionNote").value || "");
        markReportAttentionSeen(report);
        hideReportAttentionPrompt(false);
      } catch (error) {
        showToast(errorMessage(error, "확인 결과를 보내지 못했습니다."));
      } finally {
        buttons.forEach((button) => { button.disabled = false; });
      }
    }

    $("#researchProjectForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const name = $("#researchProjectName").value.trim();
      if (!name) {
        showToast("새 프로젝트명을 입력해주세요.");
        return;
      }
      try {
        await createResearchProject({
          name,
          industry: $("#researchProjectIndustry").value,
          goal: $("#researchProjectGoal").value,
        });
        $("#researchProjectName").value = "";
        $("#researchProjectIndustry").value = "";
        $("#researchProjectGoal").value = "";
        showToast("송이 프로젝트를 만들었습니다.");
      } catch (error) {
        showToast(errorMessage(error, "프로젝트를 만들지 못했습니다."));
      }
    });
    $("#researchUrl").addEventListener("input", () => {
      $("#researchPlatformPreview").textContent = inferPlatformPreview($("#researchUrl").value);
    });
    $("#researchTranscriptFile").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        $("#researchSourceText").value = text.trim();
        if (!$("#researchTitle").value.trim()) {
          $("#researchTitle").value = file.name.replace(/\.[^.]+$/, "");
        }
        $("#researchPlatformPreview").textContent = "업로드 transcript";
        showToast("Transcript 내용을 불러왔습니다.");
      } catch (_error) {
        showToast("Transcript 파일을 읽지 못했습니다.");
      }
    });
    $("#researchItemForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!state.selectedResearchProjectId) {
        showToast("자료를 넣을 프로젝트를 먼저 만들어주세요.");
        return;
      }
      const url = $("#researchUrl").value.trim();
      const sourceText = $("#researchSourceText").value.trim();
      if (!url && !sourceText) {
        showToast("URL이나 원문/메모 중 하나는 입력해주세요.");
        return;
      }
      const submitButton = $("#researchItemForm button[type='submit']");
      const originalLabel = submitButton.textContent;
      submitButton.disabled = true;
      submitButton.textContent = url ? "링크 읽는 중..." : "정리 중...";
      try {
        await createResearchItem({
          project_id: state.selectedResearchProjectId,
          url,
          title: $("#researchTitle").value,
          source_text: sourceText,
          category: $("#researchCategory").value,
          tags: $("#researchTags").value,
        });
        $("#researchUrl").value = "";
        $("#researchTitle").value = "";
        $("#researchSourceText").value = "";
        $("#researchTranscriptFile").value = "";
        $("#researchCategory").value = "";
        $("#researchTags").value = "";
        $("#researchPlatformPreview").textContent = "입력 대기";
        showToast(url ? "송이가 링크를 읽고 자료를 정리했습니다." : "송이가 자료를 정리했습니다.");
      } catch (error) {
        showToast(errorMessage(error, "자료를 정리하지 못했습니다."));
      } finally {
        submitButton.disabled = !state.selectedResearchProjectId || !(hasResearchEntitlement() && state.me?.can_execute);
        submitButton.textContent = originalLabel;
      }
    });
    $("#researchMemoForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const item = selectedResearchItem();
      if (!item) {
        showToast("수정할 자료를 먼저 선택해주세요.");
        return;
      }
      try {
        await updateResearchItem(item.id, {
          memo: $("#researchMemo").value,
          category: $("#researchDetailCategoryInput").value,
          tags: $("#researchDetailTagsInput").value,
        });
        showToast("송이 메모를 저장했습니다.");
      } catch (error) {
        showToast(errorMessage(error, "메모를 저장하지 못했습니다."));
      }
    });

          renderQuickActions();

        const target = $(`[data-tab="${button.dataset.dashboardAction}"]`);
        if (target) target.click();

        if (button.dataset.tab === "feedback") syncFeedbackEmployeeDefault(true);
        $("#pageTitle").textContent = button.dataset.title || button.textContent;
        $("#pageSubtitle").textContent = button.dataset.tab === "overview"
          ? "AIMAX의 회사 뇌와 AI 직원들이 어떻게 연결되는지 보여줍니다."
          : button.dataset.tab === "staff"
            ? "채용한 AI 직원의 이력서, 기능, 사용 가능 상태를 확인합니다."
          : button.dataset.tab === "research"
            ? "송이가 URL과 메모를 리서치 브리프로 정리합니다."
          : button.dataset.tab === "jobs"
            ? "채용한 AI 직원에게 업무를 지시하고 진행 상태를 확인합니다."
          : button.dataset.tab === "feedback"
            ? "직원 사용 경험과 개선 요청을 운영팀에 전달합니다."
            : button.dataset.tab === "settings"
              ? "로컬 실행기에 저장된 필수 설정 상태를 확인합니다."
            : button.dataset.tab === "updates"
              ? "업데이트, 설치 파일, 오류 보고, 피드백 처리 상태를 확인합니다."
              : "오류 상황을 한 곳으로 모읍니다.";
      });

    syncInstallGuideLinks();
    boot();
